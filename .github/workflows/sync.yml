name: Sync Notion to Blog

on:
  schedule:
    # 每天凌晨 00:00 (UTC) 執行，可依需求調整
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 建議使用 20 或是符合專案的版本
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Notion Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node sync-notion.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes_exist=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes_exist == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/posts/
          git commit -m "chore: auto-sync published Notion posts"
          git push
